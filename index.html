<!DOCTYPE html>
<html>
<head>
  <title>Screen Lock Wake</title>
  <link rel="icon" type="image/x-icon" href="wolf1.png">
  <style>
    /* Fix for white space below background on some screens */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url("batman-silhouette_upscaled.png");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
    }

    #wakeLockButton {
      background-color: #363736;
      color: white;
      padding: 15px 25px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }

    #uploadContainer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.85);
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    #uploadContainer label {
      font-size: 14px;
      color: #000;
      font-weight: bold;
    }

    #bgUpload {
      margin-top: 6px;
      width: 100%;
    }
  

    #futuristicClock {
      position: fixed;
      top: 90px;
      right: 24px;
      z-index: 1000;
      min-width: 260px;
      padding: 16px 22px;
      border: 1px solid rgba(250, 197, 28, 0.45);
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(8, 8, 8, 0.92), rgba(18, 18, 18, 0.84));
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.65), 0 0 24px rgba(0, 0, 0, 0.85), inset 0 0 18px rgba(250, 197, 28, 0.12);
      color: #f5c542;
      text-align: right;
      backdrop-filter: blur(2px);
    }

    #futuristicClock::before {
      content: "GOTHAM TIME";
      display: block;
      margin-bottom: 8px;
      color: rgba(250, 197, 28, 0.75);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      font-weight: 700;
      text-align: left;
      font-family: "Arial Black", "Segoe UI", Arial, sans-serif;
    }

    #clockTime {
      font-size: 2.2rem;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #ffd45c;
      text-shadow: 0 0 8px rgba(250, 197, 28, 0.55), 0 0 22px rgba(0, 0, 0, 0.95);
      font-family: "Impact", "Arial Black", "Segoe UI", sans-serif;
    }

    #clockDate {
      margin-top: 7px;
      font-size: 0.85rem;
      letter-spacing: 0.11em;
      color: #e9e9e9;
      text-transform: uppercase;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="futuristicClock" aria-live="polite">
  <div id="clockTime">--:--:--</div>
  <div id="clockDate">Loading Date...</div>
</div>

<button id="wakeLockButton">Enable Wake Lock</button>

<div id="uploadContainer">
  <label for="bgUpload">Upload Background Image:</label><br>
  <input type="file" id="bgUpload" accept="image/*">
</div>

<script>
  window.onload = function () {
    const uploadInput = document.getElementById('bgUpload');
    const uploadContainer = document.getElementById('uploadContainer');
    const wakeLockButton = document.getElementById('wakeLockButton');
    const clockTime = document.getElementById('clockTime');
    const clockDate = document.getElementById('clockDate');


    function updateClock() {
      const now = new Date();
      const timeText = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });

      const dateText = now.toLocaleDateString([], {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      clockTime.textContent = timeText;
      clockDate.textContent = dateText;
    }

    updateClock();
    setInterval(updateClock, 1000);

    uploadInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        document.body.style.backgroundImage = `url('${e.target.result}')`;
      };
      reader.readAsDataURL(file);
    });

    wakeLockButton.addEventListener('click', function () {
      uploadContainer.style.display = 'none'; // ✅ Hides the upload section
    });
  };
</script>

</body>
<script src="script6.js"></script> <!-- Keep this last -->
</html>
