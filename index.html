<!DOCTYPE html>
<html>
<head>
  <title>Screen Lock Wake</title>
  <link rel="icon" type="image/x-icon" href="wolf1.png">
  <style>
    /* Fix for white space below background on some screens */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url("batman-silhouette_upscaled.png");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
    }

    #wakeLockButton {
      background-color: #363736;
      color: white;
      padding: 15px 25px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }

    #uploadContainer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.85);
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    #uploadContainer label {
      font-size: 14px;
      color: #000;
      font-weight: bold;
    }

    #bgUpload {
      margin-top: 6px;
      width: 100%;
    }
  

    #futuristicClock {
      position: fixed;
      top: 90px;
      right: 24px;
      z-index: 1000;
      padding: 16px 22px;
      border: 1px solid rgba(120, 255, 255, 0.6);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(6, 18, 38, 0.68), rgba(7, 48, 60, 0.58));
      box-shadow: 0 0 12px rgba(0, 247, 255, 0.45), inset 0 0 16px rgba(92, 233, 255, 0.2);
      backdrop-filter: blur(6px);
      color: #d9fbff;
      text-align: right;
      min-width: 220px;
    }

    #clockTime {
      font-size: 2rem;
      letter-spacing: 0.14em;
      font-weight: 700;
      color: #b3f9ff;
      text-shadow: 0 0 8px rgba(77, 246, 255, 0.8);
      font-family: "Orbitron", "Segoe UI", Arial, sans-serif;
    }

    #clockDate {
      margin-top: 6px;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: #e7ffff;
      text-transform: uppercase;
      font-family: "Rajdhani", "Segoe UI", Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="futuristicClock" aria-live="polite">
  <div id="clockTime">--:--:--</div>
  <div id="clockDate">Loading Date...</div>
</div>

<button id="wakeLockButton">Enable Wake Lock</button>

<div id="uploadContainer">
  <label for="bgUpload">Upload Background Image:</label><br>
  <input type="file" id="bgUpload" accept="image/*">
</div>

<script>
  window.onload = function () {
    const uploadInput = document.getElementById('bgUpload');
    const uploadContainer = document.getElementById('uploadContainer');
    const wakeLockButton = document.getElementById('wakeLockButton');
    const clockTime = document.getElementById('clockTime');
    const clockDate = document.getElementById('clockDate');


    function updateClock() {
      const now = new Date();
      const timeText = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });

      const dateText = now.toLocaleDateString([], {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      clockTime.textContent = timeText;
      clockDate.textContent = dateText;
    }

    updateClock();
    setInterval(updateClock, 1000);

    uploadInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        document.body.style.backgroundImage = `url('${e.target.result}')`;
      };
      reader.readAsDataURL(file);
    });

    wakeLockButton.addEventListener('click', function () {
      uploadContainer.style.display = 'none'; // ✅ Hides the upload section
    });
  };
</script>

</body>
<script src="script6.js"></script> <!-- Keep this last -->
</html>
